# ─────────────────────────────────────────────────────────────────
#  Prefix
# ─────────────────────────────────────────────────────────────────
# Ctrl-b is the default; Ctrl-a is more reachable on most layouts.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─────────────────────────────────────────────────────────────────
#  General
# ─────────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ─────────────────────────────────────────────────────────────────
#  Splits — open new panes in the current pane's directory
# ─────────────────────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─────────────────────────────────────────────────────────────────
#  Pane navigation (vim-style: h/j/k/l)
# ─────────────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize, repeatable: -r lets you press H/J/K/L repeatedly after one prefix.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─────────────────────────────────────────────────────────────────
#  Reload config — prefix + r
# ─────────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# ─────────────────────────────────────────────────────────────────
#  Copy mode (vi keys; v to start selection, y to yank)
# ─────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─────────────────────────────────────────────────────────────────
#  Status bar
# ─────────────────────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default fg=white"
set -g status-left-length 40
set -g status-left  "#[fg=green,bold][#S] "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M"
set -g window-status-current-style "fg=yellow,bold"
